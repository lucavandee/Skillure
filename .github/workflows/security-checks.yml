name: Security checks

# Runs on every pull request and can be triggered manually. Intentionally
# does NOT run on pushes to main so that a finding in an already-merged
# commit cannot block urgent deploys — PR gating is where it matters.
on:
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (frontend, production deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Audit production dependencies
        # --audit-level=high ignores low/moderate noise so the job only
        # blocks on genuinely dangerous CVEs. --omit=dev skips build-time
        # tooling which does not ship to users.
        run: npm audit --audit-level=high --omit=dev

  pip-audit:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit backend dependencies
        run: pip-audit --requirement backend/requirements.txt --strict

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan every commit on the branch.
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.18.4
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan repository for secrets
        run: gitleaks detect --source . --redact --verbose --exit-code 1

  sql-migration-lint:
    name: SQL migration lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Static analysis of Supabase migrations
        run: bash scripts/sql-lint.sh
